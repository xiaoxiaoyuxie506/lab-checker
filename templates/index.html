<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验室正常值范围检查系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-clipboard-check me-2"></i>
                实验室正常值范围检查系统
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 上传区域 -->
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">
                            <i class="bi bi-upload me-2 text-primary"></i>
                            上传Word文档
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="upload-area" class="upload-area text-center p-5 border rounded">
                            <i class="bi bi-file-earmark-word display-1 text-muted"></i>
                            <p class="mt-3 text-muted">拖拽文件到此处，或点击选择文件</p>
                            <p class="text-muted small">支持 .docx 格式</p>
                            <input type="file" id="file-input" accept=".docx" class="d-none">
                            <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                                <i class="bi bi-folder-open me-2"></i>选择文件
                            </button>
                        </div>
                        
                        <!-- 文件信息 -->
                        <div id="file-info" class="mt-3 d-none">
                            <div class="alert alert-info d-flex align-items-center">
                                <i class="bi bi-file-earmark-text me-2"></i>
                                <span id="filename" class="flex-grow-1"></span>
                                <button class="btn btn-sm btn-outline-danger" onclick="clearFile()">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- 上传按钮 -->
                        <div class="mt-3 text-center">
                            <button id="analyze-btn" class="btn btn-success btn-lg" disabled>
                                <i class="bi bi-search me-2"></i>开始检查
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 加载动画 -->
        <div id="loading" class="row mt-4 d-none">
            <div class="col-lg-8 mx-auto text-center">
                <div class="card shadow-sm">
                    <div class="card-body p-5">
                        <div class="spinner-border text-primary mb-3" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <h5>正在分析文档...</h5>
                        <p class="text-muted">请稍候，正在检查数据完整性</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计信息 -->
        <div id="stats-section" class="row mt-4 d-none">
            <div class="col-lg-8 mx-auto">
                <div class="row g-3">
                    <div class="col-6 col-md-3">
                        <div class="card stat-card">
                            <div class="card-body text-center">
                                <div class="stat-icon text-primary">
                                    <i class="bi bi-list-ol"></i>
                                </div>
                                <h3 id="stat-records" class="stat-value">0</h3>
                                <p class="stat-label">总记录数</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card">
                            <div class="card-body text-center">
                                <div class="stat-icon text-info">
                                    <i class="bi bi-table"></i>
                                </div>
                                <h3 id="stat-tables" class="stat-value">0</h3>
                                <p class="stat-label">表格数</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card error">
                            <div class="card-body text-center">
                                <div class="stat-icon text-danger">
                                    <i class="bi bi-x-circle"></i>
                                </div>
                                <h3 id="stat-errors" class="stat-value text-danger">0</h3>
                                <p class="stat-label">错误数</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card warning">
                            <div class="card-body text-center">
                                <div class="stat-icon text-warning">
                                    <i class="bi bi-exclamation-triangle"></i>
                                </div>
                                <h3 id="stat-warnings" class="stat-value text-warning">0</h3>
                                <p class="stat-label">警告数</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 导出按钮 -->
        <div id="export-section" class="row mt-4 d-none">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h6 class="mb-0">
                            <i class="bi bi-download me-2 text-primary"></i>
                            导出结果
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex gap-2 flex-wrap">
                            <button id="export-csv" class="btn btn-outline-primary">
                                <i class="bi bi-filetype-csv me-2"></i>导出CSV
                            </button>
                            <button id="export-html" class="btn btn-outline-success">
                                <i class="bi bi-filetype-html me-2"></i>导出HTML报告
                            </button>
                            <button id="export-docx" class="btn btn-outline-info">
                                <i class="bi bi-file-earmark-word me-2"></i>导出标记文档
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 检查结果 -->
        <div id="results-section" class="row mt-4 d-none">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-clipboard-data me-2 text-primary"></i>
                            检查结果
                        </h5>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary active" data-filter="all">全部</button>
                            <button class="btn btn-outline-danger" data-filter="error">仅错误</button>
                            <button class="btn btn-outline-warning" data-filter="warning">仅警告</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table id="results-table" class="table table-hover mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>行号</th>
                                        <th>项目</th>
                                        <th>性别</th>
                                        <th>年龄范围</th>
                                        <th>参考值范围</th>
                                        <th>单位</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody id="results-tbody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 错误详情 -->
        <div id="errors-section" class="row mt-4 d-none">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow-sm border-danger">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-bug me-2"></i>
                            错误详情
                        </h5>
                    </div>
                    <div class="card-body p-0">
                        <div id="errors-list" class="list-group list-group-flush">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="mt-5 py-4 bg-light">
        <div class="container text-center text-muted">
            <p class="mb-0">实验室正常值范围检查系统 &copy; 2024</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
